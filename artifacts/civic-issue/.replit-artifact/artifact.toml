kind = "web"
previewPath = "/"
title = "FixMyCity - Civic Issue Reporter"
version = "1.0.0"
id = "artifacts/civic-issue"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20897
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/civic-issue run dev"

[services.env]
PORT = "20897"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/civic-issue", "run", "build"]
publicDir = "artifacts/civic-issue/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
